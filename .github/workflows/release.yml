name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: npm ci

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$CURRENT_TAG")
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURRENT_TAG}")
          fi
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Usage v__VERSION__"
          releaseBody: |
            インストーラー(NSIS)とポータブル版exeを配布しています。

            ## Changelog
            ${{ steps.changelog.outputs.changelog }}
          releaseDraft: true
          prerelease: false

      - name: Rename portable executable
        id: portable
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $dest = "src-tauri/target/release/easy-claude-usage_${version}_x64-portable.exe"
          Copy-Item "src-tauri/target/release/tauri-app.exe" $dest
          echo "path=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload portable executable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ steps.portable.outputs.path }}" --clobber
