<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="tray-context-menu.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage Menu</title>
    <script type="module" src="/tray-context-menu.js" defer></script>
  </head>

  <body>
    <div id="tray-context-menu" role="menu">
      <button id="menu-item-refresh" class="menu-item" type="button" role="menuitem">再取得</button>
      <button id="menu-item-update" class="menu-item" type="button" role="menuitem">アップデートを確認</button>
      <button
        id="menu-item-autostart"
        class="menu-item menu-item-checkable"
        type="button"
        role="menuitemcheckbox"
        aria-checked="false"
      >
        <span class="menu-item-check" aria-hidden="true"></span>
        <span class="menu-item-label">スタートアップ時に起動</span>
      </button>
      <hr class="menu-separator" />
      <button id="menu-item-quit" class="menu-item" type="button" role="menuitem">終了</button>
    </div>
  </body>
</html>
