<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="app" data-state="loading">
      <header id="header">
        <h1 id="header-title">Claude Usage</h1>
        <div id="header-indicators">
          <span id="refresh-spinner" aria-hidden="true"></span>
          <span id="header-status-indicator" aria-hidden="true"></span>
        </div>
      </header>

      <main id="usage-panel">
        <div id="usage-skeleton" role="status">
          <span class="visually-hidden">使用状況を取得中です</span>
          <div class="usage-meter usage-meter-skeleton" aria-hidden="true">
            <div class="usage-meter-head">
              <span class="usage-meter-label">session</span>
              <span class="usage-meter-value skeleton-shimmer">--%</span>
            </div>
            <div class="usage-meter-track">
              <div class="usage-meter-fill skeleton-fill"></div>
            </div>
            <div class="usage-meter-resets skeleton-shimmer skeleton-line"></div>
          </div>
          <div class="usage-meter usage-meter-skeleton" aria-hidden="true">
            <div class="usage-meter-head">
              <span class="usage-meter-label">week (all models)</span>
              <span class="usage-meter-value skeleton-shimmer">--%</span>
            </div>
            <div class="usage-meter-track">
              <div class="usage-meter-fill skeleton-fill"></div>
            </div>
            <div class="usage-meter-resets skeleton-shimmer skeleton-line"></div>
          </div>
        </div>
        <div id="usage-content"></div>
        <div id="last-updated" aria-live="polite"></div>
        <div id="error-message" role="alert"></div>
      </main>
    </div>
  </body>
</html>
